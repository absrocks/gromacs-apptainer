name: Build and Push Container

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t ghcr.io/absrocks/gromacs-apptainer:latest -f docker/Dockerfile .

      - name: Push image
        run: docker push ghcr.io/absrocks/gromacs-apptainer:latest